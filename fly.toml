# fly.toml — Northwind Weather on Fly.io

app = "northwind-weather"
primary_region = "ord"  # Chicago — central US, good latency for most of US

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep awake (no cold start)
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080
  
  [[services.ports]]
    port = 80
    handlers = ["http"]
    
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
